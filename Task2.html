<body>

    <script>
        let marks =Number (prompt ( "Enter your Marks."));

        if (marks >= 80){
            alert ("GRADE : A");
        }

        else if (marks >= 60) {
            alert ("GRADE : B");
        }

        else if (marks >= 40) {
            alert ("GRADE : C");
        }

        else {
            alert ("YOU ARE FAIL")
        }
    </script>
    
</body>
